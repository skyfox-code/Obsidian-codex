on:
  release:
    types: [created]
  workflow_dispatch:
      inputs:
        tag:
          description: 'Release tag (e.g. v1.0.0)'
          required: true

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create and push tag
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag ${{ github.event.inputs.tag }}
          git push origin ${{ github.event.inputs.tag }}

      - name: Build release zip
        run: |
          mkdir Obsidian-codex
          cp -r * Obsidian-codex/ 2>/dev/null || true
          cp -r .* Obsidian-codex/ 2>/dev/null || true
          rm -rf Obsidian-codex/.git
          rm -f Obsidian-codex/README.md Obsidian-codex/readme.md Obsidian-codex/README*
          zip -r Obsidian-codex.zip Obsidian-codex/

      - name: Create release and upload zip
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.tag }}
          files: Obsidian-codex.zip
